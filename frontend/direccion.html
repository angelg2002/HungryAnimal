<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>HungryAnimal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-orange-100 flex flex-col min-h-screen">
    <header class="bg-amber-700 px-6 py-3 text-white flex  gap-4">
        <div class="flex  md:flex-row items-center justify-between w-full gap-4">

            <!--Logo de HungryAnimal-->
            <div class=" flex flex-col items-start">
                <a href="index.html">
                    <img src="./galery/HungryAnimal Fondo-png.png" alt="logo de HungryANimal"
                        class="w-20 h-fit md:w-60">
                </a>
                <!--Menu principal-->

                <ul class=" hidden bg-amber-800 fixed h-screen  z-50  flex-col top-0 left-0 w-64 gap-10 p-4 lg:relative lg:h-auto lg:p-0 lg:bg-transparent lg:w-full lg:flex lg:flex-row  lg:gap-10"
                    id="menu-principal">
                    <button id="btn-cerrar" class="lg:hidden flex items-end text-white text-2xl p-4 self-end">X</button>
                    <div class="flex justify-start mr-2 gap-4 items-start flex-row ">
                        <li class="direccion-lista  lg:hidden hover:translate-x-1 hover:scale-105"><a href="login.html">
                                <img src="./galery/mi perfil logo-Photoroom.png" alt="Perfil"
                                    class="w-16  transition transform hover:translate-x-1 hover:scale-105"></a>
                        </li>
                        <li class="direccion-lista lg:hidden md:justify-center hover:translate-x-1 hover:scale-105 ">
                            <a href="#"><img src="./galery/notificaciones png.png" alt="notificaciones"
                                    class="w-16 transition transform"></a>
                            <div
                                class="absolute hidden w-8 h-8 bg-red-500 text-white text-sm rounded-full ml-12 border-2 border-lime-800/75">
                            </div>
                        </li>
                    </div>
                    <li class="transition transform hover:scale-105 underline"><a href="index.html">Inicio</a></li>
                    <li class="transition transform hover:scale-105"><a href="domesticos.html">Domesticos</a></li>
                    <li class="transition transform hover:scale-105"><a href="silvestres.html">Silvestres</a></li>
                    <li class="transition transform hover:scale-105"><a href="miVeterinario.html">Mi veterinario</a>
                    </li>
                    <li class="transition transform hover:scale-105"><a href="ofertadeldia.html">Ofertas del dia</a>
                    </li>
                    <li class="transition transform hover:scale-105"><a href="foro.html">Foro</a></li>
                    <li
                        class="direccion-lista  lg:hidden transition transform  hover:translate-x-1 hover:text-shadow-lime-800-100 duration-200">
                        <div
                            class=" flex grid-cols-2 items-center gap-1 transition transform hover:translate-x-1 hover:scale-105 direccion">
                            <a href="direccion.html">Dirección de entrega</a>
                            <img src="./galery/triangulo verde..png" alt="" class="w-3 h-3 gap-0.5 mt-1.5">
                        </div>
                    </li>
                </ul>
            </div>
            <button class=" flex lg:hidden rounded-2xl font-normal contain-content w-12" id="menu-despliegue"><img
                    src="./galery/icono-menu.png" alt="" class="h-fi"></button>
            <!---Buscador-->
            <div class="relative  w-full flex   md:w-2/3 lg:w-3/4 order-2 md:order-3 flex-3">
                <input type="text" placeholder="busca productos grawndiosos" id="buscador"
                    class="     w-full h-10    lg:flex  md:w-3/4 lg:w-3/4 order-3 px-12 py-2  rounded-lg bg-green-50 text-black"
                    alt="lupa">
                <img src="./galery/bucador con lupa.png" alt="buscador"
                    class=" p-0   text-gray-700   absolute h-full w-10 border-r-2 border-gray-300 rounded-3xl"
                    id="lupa">
            </div>
            <!--Iconocos de la derecha,  acá van los datos para el cliente-->
            <ul
                class="lg:flex  lg:flex-row gap-2 lg:gap-6s items-end justify-end lg:gap-6 lg:items-center md:justify-between order-2 lg:order-6">
                <li
                    class="lg:block transition transform  hover:translate-x-1 hover:text-shadow-lime-800-100 duration-200">
                    <div
                        class="hidden lg:flex grid-cols-2 items-center gap-1 transition transform hover:translate-x-1 hover:scale-105 direccion">
                        <a href="direccion.html">Dirección de entrega</a>
                        <img src="./galery/triangulo verde..png" alt="" class="w-3 h-3 gap-0.5 mt-1.5">
                    </div>
                </li>
                <li class="hidden lg:flex hover:translate-x-1 hover:scale-105"><a href="login.html">
                        <img src="./galery/mi perfil logo-Photoroom.png" alt="Perfil"
                            class="w-12  transition transform hover:translate-x-1 hover:scale-105"></a>
                </li>
                <li class="hidden lg:flex md:justify-center hover:translate-x-1 hover:scale-105 ">
                    <a href="#"><img src="./galery/notificaciones png.png" alt="notificaciones"
                            class="w-12 transition transform "></a>
                    <div class="absolute hidden w-8 h-8 bg-red-500 text-white text-sm  
                                    rounded-full ml-12 border-2 border-lime-800/75"></div>
                </li>

                <li class="justify-center flex hover:translate-x-1 hover:scale-105">
                    <a href="carrito.html" rel="noopener noreferrer"><img src="./galery/carrito.png" alt="carrito"
                            class="w-12 transition transform "></a>
                    <div class="absolute hidden w-6 h-6 bg-red-500 text-white text-center mt-auto rounded-full ml-12 border-2 border-lime-800/75"
                        id="contador-carrito">
                    </div>
                </li>
            </ul>
        </div>
    </header>

    <!--Página principal-->
    <main class="w-11/12 max-w-7xl m-auto flex flex-col lg:flex-row gap-8 my-10 flex-grow" id="main-id">
        <!-- Contenedor del Formulario -->
        <div class="w-full lg:w-3/5">
            <div
                class="bg-white rounded-[2rem] shadow-2xl border border-orange-200/50 p-8 md:p-12 h-full flex flex-col">
                <h2 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-8 tracking-tight">
                    Confirma tu dirección de <span class="text-amber-600">entrega</span>
                </h2>

                <form id="address-form" class="flex flex-col gap-6 flex-grow">
                    <div class="relative group">
                        <label
                            class="block text-sm font-semibold text-gray-700 mb-2 transition-colors group-focus-within:text-lime-700">Datos
                            de envío</label>
                        <input type="text" id="address-street" placeholder="Ej. Calle 123 #45-67" required
                            class="w-full px-5 py-4 bg-orange-50/50 border border-lime-800/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-lime-700/50 focus:border-transparent transition-all duration-300 text-gray-800 font-medium placeholder-gray-400">
                    </div>

                    <div class="relative group">
                        <label
                            class="block text-sm font-semibold text-gray-700 mb-2 transition-colors group-focus-within:text-lime-700">Ciudad</label>
                        <input type="text" id="address-city" placeholder="Ej. Bogotá" required
                            class="w-full px-5 py-4 bg-orange-50/50 border border-lime-800/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-lime-700/50 focus:border-transparent transition-all duration-300 text-gray-800 font-medium placeholder-gray-400">
                    </div>

                    <div class="relative group">
                        <label
                            class="block text-sm font-semibold text-gray-700 mb-2 transition-colors group-focus-within:text-lime-700">Nombre
                            del remitente</label>
                        <input type="text" id="address-name" placeholder="Ej. Juan Pérez" required
                            class="w-full px-5 py-4 bg-orange-50/50 border border-lime-800/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-lime-700/50 focus:border-transparent transition-all duration-300 text-gray-800 font-medium placeholder-gray-400">
                    </div>

                    <ul class="flex flex-col sm:flex-row gap-4 sm:gap-8 mt-6 font-semibold text-amber-700">
                        <li>
                            <a href="#"
                                class="flex items-center gap-2 hover:text-amber-800 transition-colors group decoration-2 underline-offset-4 hover:underline">
                                <i class="fas fa-edit text-lime-700 group-hover:scale-110 transition-transform"></i>
                                Editar dirección
                            </a>
                        </li>
                        <li>
                            <a href="#"
                                class="flex items-center gap-2 hover:text-amber-800 transition-colors group decoration-2 underline-offset-4 hover:underline">
                                <i
                                    class="fas fa-map-marker-alt text-lime-700 group-hover:scale-110 transition-transform"></i>
                                Agregar indicaciones
                            </a>
                        </li>
                    </ul>
                </form>
                <button type="submit" form="address-form"
                    class="w-full bg-lime-800 text-white mt-6 py-3 rounded-xl font-bold hover:bg-lime-900 transition">
                    Confirmar dirección
                </button>
            </div>
        </div>

        <!-- Contenedor del Checkout -->
        <div class="w-full lg:w-2/5">
            <div
                class="bg-gradient-to-br from-amber-50 to-orange-100/40 rounded-[2rem] shadow-xl border border-orange-200/50 h-full p-6 md:p-8 flex flex-col relative overflow-hidden">
                <!-- Decoración -->
                <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-lime-800/5 blur-2xl"></div>

                <h3 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-3">
                    <i class="fas fa-shopping-bag text-lime-700"></i> Resumen de Compra
                </h3>

                <div id="contenedor-checkout" class="flex-grow w-full space-y-4">
                    <!-- Dinámico: el js llenará esto -->
                </div>
            </div>
        </div>
    </main>
    <footer class="flex justify-items-end bg-amber-700 p-4 mt-auto w-full">
        <div class="text-shadow-yellow-50 w-full">
            <ul class="inline-flex px-4 justify-between w-full text-amber-100">
                <li>© 2025 HungryAnimal</li>
                <li>Nosotros</li>
                <li>Información</li>
            </ul>
        </div>
    </footer>

    <script src="./src/datos.js"></script>
    <script src="./src/storage.js"></script>
    <script src="./src/app.js"></script>
    <script src="./src/carrito.js"></script>
    <script src="./src/checkout.js"></script>


</body>

</html>
