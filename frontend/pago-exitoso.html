<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Compra Exitosa! - HungryAnimal</title>
    <link href="./src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 flex items-center justify-center min-h-screen">
    
    <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-2xl border-t-8 border-amber-600 max-w-lg w-full text-center mx-4 flex flex-col items-center gap-6 transform transition-all hover:-translate-y-1">
        
        <!-- Logo Lagartija -->
        <div class="w-32 h-32 bg-amber-600 rounded-full flex items-center justify-center mb-2 shadow-inner p-4">
            <img src="./galery/delivery-ontheway.png" alt="HungryAnimal Lagartija" class="w-full h-full object-contain">
        </div>

        <!-- Mensaje -->
        <div>
            <h1 class="text-4xl font-extrabold text-amber-900 mb-3 tracking-tight">
                ¡Compra Exitosa!
            </h1>
            <p class="text-lg text-gray-600 font-medium">
                Tu pedido ha sido procesado y recibido correctamente en nuestro sistema. <br>
                <span class="text-[#F28705] font-bold">¡Gracias por confiar en HungryAnimal!</span>
            </p>
        </div>

        <!-- Botones de Acción -->
        <div class="w-full flex flex-col gap-3 mt-4">
            <a href="index.html" class="w-full bg-[#F28705] hover:bg-orange-600 text-white py-4 rounded-xl font-bold text-lg transition-colors shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
                <i class="fas fa-shopping-bag"></i> Volver a la tienda
            </a>
            <a href="perfil.html" class="w-full bg-white border-2 border-amber-800 text-amber-900 hover:bg-amber-50 py-4 rounded-xl font-bold text-lg transition-colors flex items-center justify-center gap-2">
                <i class="fas fa-list-ul"></i> Ver mis pedidos
            </a>
        </div>
        
    </div>

</body>
</html>
